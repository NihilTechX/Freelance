# EliteMatch – Free Hosting Stack
# Frontend  → Vercel
# Backend   → Render.com (Web Service)
# Database  → Neon.tech (Serverless PostgreSQL)

services:
  # ── FastAPI Backend ──────────────────────────────────────
  - type: web
    name: elitematch-api
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Set to Neon PostgreSQL URL
      - key: REDIS_URL
        value: ""            # Optional — leave empty if no Redis
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: CELERY_BROKER_URL
        value: ""            # Not used without worker
      - key: CELERY_RESULT_BACKEND
        value: ""            # Not used without worker
      - key: CORS_ORIGINS
        value: '["https://freelance-pi-gold.vercel.app"]'
      - key: APP_NAME
        value: EliteMatch
      - key: APP_VERSION
        value: 1.0.0
      - key: DEBUG
        value: false
